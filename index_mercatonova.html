<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercato Nova</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    /* ── HEADER ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #1a1a1a;
      text-decoration: none;
      white-space: nowrap;
    }

    .logo span { font-size: 1.4rem; }

    .search-bar {
      flex: 1;
      max-width: 380px;
      margin-left: auto;
      position: relative;
    }

    .search-bar input {
      width: 100%;
      padding: 8px 14px 8px 36px;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: #f2f2f2;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus { border-color: #a0a0a0; background: #fff; }

    .search-bar .icon-search {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      font-size: 0.9rem;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    nav a {
      text-decoration: none;
      color: #1a1a1a;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    nav a:hover { background: #f0f0f0; }

    .nav-icons {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .nav-icon {
      position: relative;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      font-size: 1.1rem;
      color: #1a1a1a;
      transition: background 0.15s;
      display: flex;
      align-items: center;
    }

    .nav-icon:hover { background: #f0f0f0; }

    .badge {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #e53e3e;
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      border-radius: 999px;
      min-width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
    }

    /* ── MAIN ── */
    main {
      max-width: 1160px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    /* ── SECTIONS ── */
    .section-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    section { margin-bottom: 40px; }

    /* ── PRODUCT GRID ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    @media (max-width: 900px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 540px) { .product-grid { grid-template-columns: 1fr; } }

    /* ── CARD ── */
    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
    }

    .card:hover {
      box-shadow: 0 4px 18px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }

    .card-img-wrapper {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body { padding: 12px 14px 14px; }

    .card-name {
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .card-price {
      font-size: 0.88rem;
      color: #555;
      margin-bottom: 10px;
    }

    .card-price strong { color: #1a1a1a; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-enchere  { background: #f59e0b; color: #fff; }
    .btn-nego     { background: #22c55e; color: #fff; }
    .btn-achat    { background: #e5e7eb; color: #374151; }

    /* ── TIMER ── */
    .card-timer {
      font-size: 0.78rem;
      color: #e53e3e;
      font-weight: 600;
      margin-bottom: 6px;
    }

    /* ── CATEGORIES ── */
    .cat-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .cat-btn {
      padding: 8px 22px;
      border: 1.5px solid #ccc;
      border-radius: 999px;
      background: #fff;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .cat-btn:hover, .cat-btn.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    /* ── NOTIFICATION PANEL ── */
    .notif-panel {
      position: absolute;
      top: 52px;
      right: 0;
      width: 300px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
      display: none;
      z-index: 200;
      overflow: hidden;
    }

    .notif-panel.open { display: block; }

    .notif-header {
      padding: 12px 16px;
      font-weight: 700;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.95rem;
    }

    .notif-item {
      display: flex;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #f8f8f8;
      font-size: 0.84rem;
      align-items: flex-start;
      transition: background 0.1s;
    }

    .notif-item:hover { background: #fafafa; }
    .notif-item .icon { font-size: 1.1rem; margin-top: 1px; }
    .notif-item p { line-height: 1.4; }
    .notif-item small { color: #888; }
    .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; margin-top: 5px; flex-shrink: 0; }

    .notif-trigger { position: relative; }
  </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <a class="logo" href="#">
    <span>♪</span> MERCATO NOVA
  </a>

  <div class="search-bar">
    <span class="icon-search">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher..." oninput="handleSearch(this.value)" />
  </div>

  <nav>
    <a href="#">Catalogue</a>
    <a href="#">Enchères</a>
  </nav>

  <div class="nav-icons">
    <!-- Notifications -->
    <div class="notif-trigger">
      <button class="nav-icon" onclick="toggleNotif()" title="Notifications">
        🔔
        <span class="badge" id="notifBadge">3</span>
      </button>
      <div class="notif-panel" id="notifPanel">
        <div class="notif-header">Notifications</div>
        <div class="notif-item">
          <span class="icon">🔨</span>
          <div>
            <p>Vous avez été surenchéri sur <strong>Platine Technics SL-1200</strong></p>
            <small>Il y a 5 min</small>
          </div>
          <span class="notif-dot"></span>
        </div>
        <div class="notif-item">
          <span class="icon">💬</span>
          <div>
            <p>Contre-offre reçue sur <strong>Casque Sennheiser HD600</strong></p>
            <small>Il y a 1h</small>
          </div>
          <span class="notif-dot"></span>
        </div>
        <div class="notif-item">
          <span class="icon">✅</span>
          <div>
            <p>Votre achat <strong>Daft Punk — RAM</strong> a été confirmé</p>
            <small>Hier</small>
          </div>
          <span class="notif-dot"></span>
        </div>
      </div>
    </div>

    <!-- Panier -->
    <button class="nav-icon" onclick="alert('Panier — à venir')" title="Panier">
      🛒
      <span class="badge">1</span>
    </button>

    <!-- Compte -->
    <button class="nav-icon" onclick="alert('Mon compte — à venir')" title="Mon compte">
      👤
    </button>
  </div>
</header>

<!-- ══ MAIN ══ -->
<main>

  <!-- Enchères en cours -->
  <section>
    <h2 class="section-title">Enchères en cours 🔥</h2>
    <div class="product-grid" id="encheresGrid"></div>
  </section>

  <!-- Ajoutés récemment -->
  <section>
    <h2 class="section-title">Ajoutés récemment</h2>
    <div class="product-grid" id="recentGrid"></div>
  </section>

  <!-- Catégories -->
  <section>
    <h2 class="section-title">Catégories</h2>
    <div class="cat-list" id="catList"></div>
  </section>

</main>

<script>
  /* ── DATA ── */
  const encheres = [
    { id: 1, name: "Abbey Road — 1ère press.",  img: "Abbey_Road.jpeg",    bg: "#e8d5b7", price: 85,  timer: "02:14:30" },
    { id: 2, name: "Platine Technics SL-1200",  img: "Platine Technics SL-1200.jpeg", bg: "#d0d0d0", price: 320, timer: "00:45:12" },
    { id: 3, name: "Kind of Blue — Miles Davis",img: "kind-of-blue.jpeg",  bg: "#c8daf0", price: 45,  timer: "05:00:00" },
    { id: 4, name: "Ampli Marantz 2270",         img: "marantz-2270.jpg",  bg: "#e0d0c0", price: 550, timer: "01:20:00" },
  ];

  const recents = [
    { id: 5, name: "Daft Punk — RAM",         img: "daft-punk-ram.jpeg",      bg: "#d5d5e8", price: 35,  type: "achat" },
    { id: 6, name: "Casque Sennheiser HD600",  img: "sennheiser-hd600.jpg",   bg: "#d0d0d0", price: 180, type: "nego"  },
    { id: 7, name: "Lot 20 vinyles Jazz",      img: "vinyles-jazz.webp",       bg: "#fce4b0", price: 60,  type: "nego"  },
    { id: 8, name: "Enceintes JBL L100",       img: "jbl-l100.png",           bg: "#c8d8c8", price: 450, type: "achat" },
  ];

  const categories = ["Vinyles","CD","Platines","Amplis","Enceintes","Casques","Accessoires"];

  /* ── RENDER ENCHERES ── */
  function renderEncheres(items) {
    const grid = document.getElementById("encheresGrid");
    grid.innerHTML = items.map(p => `
      <div class="card" onclick="openProduct(${p.id})">
        <div class="card-img-wrapper" style="background:${p.bg}">
          <img class="card-img" src="${p.img}" alt="${p.name}"
               onerror="this.style.display='none'">
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-timer">⏱ ${p.timer}</div>
          <div class="card-price">Enchère : <strong>${p.price} €</strong></div>
          <button class="btn btn-enchere" onclick="enchereClick(event,${p.id})">Enchère</button>
        </div>
      </div>
    `).join("");
  }

  /* ── RENDER RECENTS ── */
  function renderRecents(items) {
    const grid = document.getElementById("recentGrid");
    grid.innerHTML = items.map(p => {
      const btnClass = p.type === "nego" ? "btn-nego" : "btn-achat";
      const btnLabel = p.type === "nego" ? "Négo" : "Achat";
      return `
        <div class="card" onclick="openProduct(${p.id})">
          <div class="card-img-wrapper" style="background:${p.bg}">
            <img class="card-img" src="${p.img}" alt="${p.name}"
                 onerror="this.style.display='none'">
          </div>
          <div class="card-body">
            <div class="card-name">${p.name}</div>
            <div class="card-price"><strong>${p.price} €</strong></div>
            <button class="btn ${btnClass}" onclick="transactionClick(event,${p.id},'${p.type}')">${btnLabel}</button>
          </div>
        </div>
      `;
    }).join("");
  }

  /* ── RENDER CATEGORIES ── */
  function renderCategories() {
    const list = document.getElementById("catList");
    list.innerHTML = categories.map(c => `
      <button class="cat-btn" onclick="filterCategory(this,'${c}')">${c}</button>
    `).join("");
  }

  /* ── SEARCH ── */
  function handleSearch(val) {
    const q = val.toLowerCase().trim();
    const filteredE = encheres.filter(p => p.name.toLowerCase().includes(q));
    const filteredR = recents.filter(p => p.name.toLowerCase().includes(q));
    renderEncheres(filteredE);
    renderRecents(filteredR);
  }

  /* ── CATEGORY FILTER ── */
  function filterCategory(btn, cat) {
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    alert(`Filtre : ${cat} — connexion catalogue à venir`);
  }

  /* ── ACTIONS ── */
  function openProduct(id) { alert(`Fiche produit #${id} — à venir`); }

  function enchereClick(e, id) {
    e.stopPropagation();
    alert(`Placer une enchère sur le produit #${id} — à venir`);
  }

  function transactionClick(e, id, type) {
    e.stopPropagation();
    const label = type === "nego" ? "Négocier" : "Acheter";
    alert(`${label} le produit #${id} — à venir`);
  }

  /* ── NOTIFICATIONS ── */
  function toggleNotif() {
    const panel = document.getElementById("notifPanel");
    panel.classList.toggle("open");
  }

  document.addEventListener("click", function(e) {
    const trigger = document.querySelector(".notif-trigger");
    if (!trigger.contains(e.target)) {
      document.getElementById("notifPanel").classList.remove("open");
    }
  });

  /* ── LIVE TIMERS ── */
  function parseTime(t) {
    const [h, m, s] = t.split(":").map(Number);
    return h * 3600 + m * 60 + s;
  }

  function formatTime(secs) {
    if (secs <= 0) return "Terminée";
    const h = String(Math.floor(secs / 3600)).padStart(2,"0");
    const m = String(Math.floor((secs % 3600) / 60)).padStart(2,"0");
    const s = String(secs % 60).padStart(2,"0");
    return `${h}:${m}:${s}`;
  }

  let timers = encheres.map(e => parseTime(e.timer));

  function tickTimers() {
    timers = timers.map(t => Math.max(0, t - 1));
    const timerEls = document.querySelectorAll(".card-timer");
    timerEls.forEach((el, i) => {
      el.textContent = "⏱ " + formatTime(timers[i]);
      el.style.color = timers[i] < 600 ? "#e53e3e" : timers[i] < 3600 ? "#d97706" : "#888";
    });
  }

  /* ── INIT ── */
  renderEncheres(encheres);
  renderRecents(recents);
  renderCategories();
  setInterval(tickTimers, 1000);
</script>

</body>
</html>
